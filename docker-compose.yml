version: '3.8'

services:
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dora-metrics

  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=dora-metrics
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_RETENTION=90d
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - dora-metrics
    restart: unless-stopped

networks:
  dora-metrics:
    driver: bridge

volumes:
  influxdb-data:
