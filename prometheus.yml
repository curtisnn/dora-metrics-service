global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dora-metrics-monitor'

# Alertmanager configuration (optional - can be added later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - 'alerts.yml'

scrape_configs:
  # Scrape DORA metrics ingestion service
  - job_name: 'dora-metrics-ingestion'
    static_configs:
      - targets: ['ingestion:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
